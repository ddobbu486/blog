<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>블로그 제품 추천기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Malgun Gothic',sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh}
header{background:#fff;border-bottom:1px solid #e8e6e0;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:16px;font-weight:600}
.sub{font-size:12px;color:#888;margin-top:2px}
.hbtn{padding:8px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#555;font-size:13px;cursor:pointer;font-family:inherit}
.hbtn.ok{border-color:#1a8a5a;color:#1a8a5a}
.mbg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:9999;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:14px;padding:28px;width:90%;max-width:500px}
.modal h2{font-size:16px;font-weight:600;margin-bottom:8px}
.mdesc{font-size:13px;color:#666;margin-bottom:16px;line-height:1.6}
.mok{background:#d4f0e4;color:#1a6644;font-size:12px;padding:8px 12px;border-radius:6px;margin-bottom:12px}
.mno{background:#fef0ee;color:#c0392b;font-size:12px;padding:8px 12px;border-radius:6px;margin-bottom:12px}
.msec{margin-bottom:14px}
.msec label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:5px}
.msec input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #ddd;font-size:13px;font-family:inherit}
.msec input:focus{outline:none;border-color:#888}
.mhint{font-size:12px;color:#aaa;margin-top:4px}
.mhint a{color:#666}
.mdiv{border:none;border-top:1px solid #eee;margin:14px 0}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.bsave{padding:10px 22px;border-radius:8px;border:none;background:#1a1a18;color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.bcancel{padding:10px 18px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#555;font-size:14px;cursor:pointer;font-family:inherit}
.wrap{max-width:920px;margin:0 auto;padding:24px 16px}
.tabs{display:flex;gap:6px;margin-bottom:20px}
.tab{padding:9px 18px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#666;font-size:14px;cursor:pointer;font-family:inherit}
.tab.on{background:#1a1a18;color:#fff;border-color:#1a1a18}
.bdg{display:inline-block;font-size:11px;padding:1px 7px;border-radius:20px;margin-left:6px;vertical-align:middle}
.ba{background:#d4f0e4;color:#1a6644}
.bb{background:#d4e8fb;color:#1a4f8a}
.bc{background:#fce8c4;color:#8a4f1a}
.tab.on .ba,.tab.on .bb,.tab.on .bc{background:rgba(255,255,255,0.25);color:#fff}
.panel{display:none}
.panel.on{display:block}
.binfo{background:#fff;border-radius:10px;border:1px solid #e8e6e0;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.bico{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ica{background:#d4f0e4}
.icb{background:#d4e8fb}
.icc{background:#fce8c4}
.btitle{font-size:14px;font-weight:600}
.btopc{font-size:12px;color:#888;margin-top:2px}
.btnrow{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.rbtn{padding:11px 22px;border-radius:8px;border:none;background:#1a1a18;color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.rbtn:disabled{opacity:0.4;cursor:not-allowed}
.ibtn{padding:11px 22px;border-radius:8px;border:1px solid #555;background:#fff;color:#333;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.ibtn:disabled{opacity:0.4;cursor:not-allowed}
.wbtn{padding:11px 22px;border-radius:8px;border:1px solid #888;background:#fff;color:#444;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.wbox{background:#f9f8f6;border:1px solid #e8e6e0;border-radius:10px;padding:16px;margin-bottom:16px;display:none}
.wbox.on{display:block}
.wbox textarea{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #ddd;font-size:13px;font-family:inherit;resize:none;line-height:1.6;margin-bottom:8px}
.wbox textarea:focus{outline:none;border-color:#888}
.whint{font-size:12px;color:#bbb;margin-bottom:10px}
.wrunbtn{padding:9px 18px;border-radius:8px;border:none;background:#1a1a18;color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.wrunbtn:disabled{opacity:0.4;cursor:not-allowed}
.dsbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#fff;border-radius:8px;border:1px solid #e8e6e0;margin-bottom:14px;font-size:12px;color:#666}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dotg{background:#03c75a}
.doty{background:#f0a500}
.tbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;padding:10px 14px;background:#fff;border-radius:8px;border:1px solid #e8e6e0}
.tlbl{font-size:12px;color:#888;font-weight:600}
.tkw2{font-size:12px;padding:3px 10px;border-radius:20px;border:1px solid #e0ddd6;color:#444;background:#fafaf8}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;margin-bottom:8px}
.card{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:8px}
.cnum{font-size:11px;font-weight:600;color:#aaa}
.cname{font-size:14px;font-weight:600;color:#1a1a18;line-height:1.4}
.creason{font-size:13px;color:#555;line-height:1.6;flex:1}
.ckws{display:flex;flex-wrap:wrap;gap:4px}
.ckw{font-size:11px;color:#666;background:#f5f4f0;border:1px solid #e0ddd6;border-radius:4px;padding:2px 7px}
.clink{padding-top:8px;border-top:1px solid #f0ede8}
.clink a{font-size:13px;color:#d44b00;text-decoration:none;font-weight:500}
.stitle{font-size:13px;font-weight:600;color:#555;margin:24px 0 12px}
.tcard{background:#fff;border:1px solid #e8e6e0;border-radius:10px;padding:14px 16px;display:flex;gap:12px;margin-bottom:8px}
.tnum{font-size:12px;font-weight:700;color:#bbb;min-width:20px;padding-top:1px}
.tbody{flex:1}
.ttitle{font-size:14px;font-weight:600;color:#1a1a18;margin-bottom:4px;line-height:1.4}
.tintro{font-size:13px;color:#888;font-style:italic;margin-bottom:6px;line-height:1.5}
.tsubs{margin-bottom:6px}
.tsub{font-size:13px;color:#444;padding:1px 0;display:flex;gap:6px}
.tsubn{color:#bbb;font-weight:600;min-width:14px}
.tkws{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.tkw{font-size:11px;color:#666;background:#f0f7ff;border:1px solid #d4e8fb;border-radius:4px;padding:2px 7px}
.ikw{font-size:11px;color:#8a4f1a;background:#fce8c4;border:1px solid #f5d4a0;border-radius:4px;padding:2px 7px}
.ibadge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:#fce8c4;color:#8a4f1a;border:1px solid #f5d4a0;margin-bottom:6px}
.csm{padding:5px 12px;border-radius:6px;border:1px solid #ddd;background:#fff;color:#666;font-size:12px;cursor:pointer;font-family:inherit}
.csm:hover{background:#f5f4f0}
.cbar{margin-top:20px}
.cbtn{padding:9px 16px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#555;font-size:13px;cursor:pointer;font-family:inherit}
.cbtn:hover{background:#f5f4f0}
.empty{display:flex;flex-direction:column;align-items:center;padding:48px 16px;color:#bbb;gap:10px;text-align:center;font-size:14px}
.nokey{display:flex;flex-direction:column;align-items:center;padding:36px 16px;gap:12px;text-align:center}
.nokey p{font-size:14px;color:#888}
.nokey button{padding:10px 20px;border-radius:8px;border:none;background:#1a1a18;color:#fff;font-size:14px;cursor:pointer;font-family:inherit}
.err{color:#c0392b;font-size:13px;padding:10px 14px;background:#fef0ee;border-radius:8px;border:1px solid #f5c6c0;margin-bottom:12px}
.loading{font-size:13px;color:#aaa;padding:12px 0}
@media(max-width:600px){.tabs{overflow-x:auto}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div><h1>블로그 제품 추천기</h1><div class="sub">AI 웹검색 기반 분석</div></div>
  <button class="hbtn" id="hbtn" onclick="openModal()">API 키 설정</button>
</header>

<div class="mbg" id="mbg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>API 키 설정</h2>
    <p class="mdesc">입력한 키는 브라우저 로컬에만 저장됩니다.</p>
    <div id="mstat"></div>
    <div class="msec">
      <label>Anthropic API 키 (필수)</label>
      <input type="password" id="ikey" placeholder="sk-ant-..." autocomplete="off">
      <div class="mhint">발급: <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a></div>
    </div>
    <hr class="mdiv">
    <div class="msec">
      <label>네이버 데이터랩 Client ID (선택)</label>
      <input type="text" id="inid" placeholder="Client ID" autocomplete="off">
      <div class="mhint" style="margin-bottom:10px">발급: <a href="https://developers.naver.com/apps/#/register" target="_blank">developers.naver.com</a> - 데이터랩(쇼핑인사이트)</div>
      <label>네이버 데이터랩 Client Secret (선택)</label>
      <input type="password" id="insec" placeholder="Client Secret" autocomplete="off">
    </div>
    <div class="mact">
      <button class="bcancel" onclick="closeModal()">취소</button>
      <button class="bsave" onclick="saveKeys()">저장</button>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="tabs">
    <button class="tab on" id="tab-a" onclick="switchTab('a')">블로그 A <span class="bdg ba">네이버쇼핑</span></button>
    <button class="tab" id="tab-b" onclick="switchTab('b')">블로그 B <span class="bdg bb">네이버쇼핑</span></button>
    <button class="tab" id="tab-c" onclick="switchTab('c')">블로그 C <span class="bdg bc">쿠팡파트너스</span></button>
  </div>

  <div id="pa" class="panel on">
    <div class="binfo"><div class="bico ica">A</div><div><div class="btitle">블로그 A · 네이버쇼핑 커넥터</div><div class="btopc">생활잡화, 화장품, 미용, 패션, 반려견</div></div></div>
    <div class="btnrow">
      <button class="rbtn" id="rba" onclick="runMain('a')">오늘 추천 받기</button>
      <button class="ibtn" id="iba" onclick="runIssue('a')">이슈 주제</button>
      <button class="wbtn" onclick="toggleW('a')">오늘 쓴 글 기반</button>
    </div>
    <div class="wbox" id="wbox-a">
      <textarea id="wtxt-a" rows="3" placeholder="오늘 쓴 글 제목/주제 입력 (쉼표 또는 줄바꿈으로 구분)"></textarea>
      <div class="whint">입력 후 버튼 클릭</div>
      <button class="wrunbtn" id="wrun-a" onclick="runW('a')">연관 주제 추천 받기</button>
    </div>
    <div id="ra"></div><div id="ia"></div><div id="wa"></div>
  </div>

  <div id="pb" class="panel">
    <div class="binfo"><div class="bico icb">B</div><div><div class="btitle">블로그 B · 네이버쇼핑 커넥터</div><div class="btopc">생활가전, 주방용품, 육아</div></div></div>
    <div class="btnrow">
      <button class="rbtn" id="rbb" onclick="runMain('b')">오늘 추천 받기</button>
      <button class="ibtn" id="ibb" onclick="runIssue('b')">이슈 주제</button>
      <button class="wbtn" onclick="toggleW('b')">오늘 쓴 글 기반</button>
    </div>
    <div class="wbox" id="wbox-b">
      <textarea id="wtxt-b" rows="3" placeholder="오늘 쓴 글 제목/주제 입력 (쉼표 또는 줄바꿈으로 구분)"></textarea>
      <div class="whint">입력 후 버튼 클릭</div>
      <button class="wrunbtn" id="wrun-b" onclick="runW('b')">연관 주제 추천 받기</button>
    </div>
    <div id="rb"></div><div id="ib"></div><div id="wb"></div>
  </div>

  <div id="pc" class="panel">
    <div class="binfo"><div class="bico icc">C</div><div><div class="btitle">블로그 C · 쿠팡 파트너스</div><div class="btopc">식품, 건강, 잡화전체</div></div></div>
    <div class="btnrow">
      <button class="rbtn" id="rbc" onclick="runMain('c')">오늘 추천 받기</button>
      <button class="ibtn" id="ibc" onclick="runIssue('c')">이슈 주제</button>
      <button class="wbtn" onclick="toggleW('c')">오늘 쓴 글 기반</button>
    </div>
    <div class="wbox" id="wbox-c">
      <textarea id="wtxt-c" rows="3" placeholder="오늘 쓴 글 제목/주제 입력 (쉼표 또는 줄바꿈으로 구분)"></textarea>
      <div class="whint">입력 후 버튼 클릭</div>
      <button class="wrunbtn" id="wrun-c" onclick="runW('c')">연관 주제 추천 받기</button>
    </div>
    <div id="rc"></div><div id="ic"></div><div id="wc"></div>
  </div>
</div>

<script>
var BL = {
  a:{topics:'생활잡화, 화장품, 미용, 패션, 반려견',type:'naver',cats:'패션의류, 화장품/미용, 반려동물용품'},
  b:{topics:'생활가전, 주방용품, 육아',type:'naver',cats:'생활가전, 주방용품, 출산/육아'},
  c:{topics:'식품, 건강, 잡화전체',type:'coupang',cats:'식품, 건강'}
};
var ST = {};

function gk(){
  return {ak:localStorage.getItem('_ak')||'',nid:localStorage.getItem('_nid')||'',ns:localStorage.getItem('_ns')||''};
}

function openModal(){
  var k=gk();
  document.getElementById('ikey').value=k.ak;
  document.getElementById('inid').value=k.nid;
  document.getElementById('insec').value=k.ns;
  document.getElementById('mstat').innerHTML=k.ak
    ?'<div class="mok">Anthropic 키 저장됨'+(k.nid?' · 네이버 키도 저장됨':'')+'</div>'
    :'<div class="mno">API 키가 설정되지 않았습니다</div>';
  document.getElementById('mbg').style.display='flex';
}

function closeModal(){
  document.getElementById('mbg').style.display='none';
}

function saveKeys(){
  var ak=document.getElementById('ikey').value.trim();
  if(!ak){alert('Anthropic API 키는 필수입니다.');return;}
  localStorage.setItem('_ak',ak);
  var nid=document.getElementById('inid').value.trim();
  var ns=document.getElementById('insec').value.trim();
  if(nid)localStorage.setItem('_nid',nid);
  if(ns)localStorage.setItem('_ns',ns);
  closeModal();
  updateHbtn();
  ['a','b','c'].forEach(function(id){showInit(id);});
}

function updateHbtn(){
  var k=gk();
  var btn=document.getElementById('hbtn');
  btn.className=k.ak?'hbtn ok':'hbtn';
  btn.textContent=k.ak?'API 키 설정됨':'API 키 설정';
}

function showInit(id){
  var k=gk();
  var el=document.getElementById('r'+id);
  if(!k.ak){
    el.innerHTML='<div class="nokey"><div style="font-size:36px">?</div><p>API 키를 먼저 설정해주세요</p><button onclick="openModal()">키 설정하기</button></div>';
  } else {
    el.innerHTML='<div class="empty">버튼을 누르면 오늘 트렌드 기반으로 추천해드립니다</div>';
  }
}

function switchTab(id){
  ['a','b','c'].forEach(function(v){
    document.getElementById('tab-'+v).classList.toggle('on',v===id);
    document.getElementById('p'+v).classList.toggle('on',v===id);
  });
}

function toggleW(id){
  var box=document.getElementById('wbox-'+id);
  box.classList.toggle('on');
}

function dtstr(){
  return new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
}

function callApi(prompt,cb,errcb){
  var k=gk();
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':k.ak,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:1500,
      tools:[{type:'web_search_20250305',name:'web_search'}],
      messages:[{role:'user',content:prompt}]
    })
  })
  .then(function(r){
    if(r.status===401)throw new Error('API 키가 올바르지 않습니다');
    return r.json();
  })
  .then(function(d){
    var txt=d.content.filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('');
    var s=txt.indexOf('{'),e=txt.lastIndexOf('}');
    if(s===-1)throw new Error('JSON 파싱 실패');
    var parsed=JSON.parse(txt.slice(s,e+1));
    cb(parsed);
  })
  .catch(function(e){errcb(e.message);});
}

function makeProductHtml(p,isCoupang){
  var cu='https://www.coupang.com/np/search?q='+encodeURIComponent(p.name);
  var kws=(p.kws||[]).map(function(k){return '<span class="ckw">'+k+'</span>';}).join('');
  var link=isCoupang?'<div class="clink"><a href="'+cu+'" target="_blank">쿠팡 검색</a></div>':'';
  return '<div class="card"><div class="cnum">'+String(p.n).padStart(2,'0')+' · '+p.cat+'</div>'
    +'<div class="cname">'+p.name+'</div>'
    +'<div class="creason">'+p.reason+'</div>'
    +'<div class="ckws">'+kws+'</div>'+link+'</div>';
}

function makeTopicHtml(t,i,copyFn){
  var subs=(t.subs||[]).map(function(s,si){
    return '<div class="tsub"><span class="tsubn">'+(si+1)+'.</span> '+s+'</div>';
  }).join('');
  var kws=(t.kws||[]).map(function(k){return '<span class="tkw">'+k+'</span>';}).join('');
  return '<div class="tcard"><div class="tnum">'+String(i+1).padStart(2,'0')+'</div>'
    +'<div class="tbody">'
    +'<div class="ttitle">'+t.title+'</div>'
    +(t.intro?'<div class="tintro">"'+t.intro+'"</div>':'')
    +'<div class="tsubs">'+subs+'</div>'
    +'<div class="tkws">'+kws+'</div>'
    +'<button class="csm" data-fn="'+copyFn+'" data-idx="'+i+'">복사</button>'
    +'</div></div>';
}

function makeIssueTopicHtml(t,i,id){
  var subs=(t.subs||[]).map(function(s,si){
    return '<div class="tsub"><span class="tsubn">'+(si+1)+'.</span> '+s+'</div>';
  }).join('');
  var kws=(t.kws||[]).map(function(k){return '<span class="ikw">'+k+'</span>';}).join('');
  return '<div class="tcard"><div class="tnum">'+String(i+1).padStart(2,'0')+'</div>'
    +'<div class="tbody">'
    +'<div class="ibadge">'+t.issue+'</div>'
    +'<div class="ttitle">'+t.title+'</div>'
    +(t.intro?'<div class="tintro">"'+t.intro+'"</div>':'')
    +'<div class="tsubs">'+subs+'</div>'
    +'<div class="tkws">'+kws+'</div>'
    +'<button class="csm" data-fn="issue" data-id="'+id+'" data-idx="'+i+'">복사</button>'
    +'</div></div>';
}

// 이벤트 위임으로 복사 버튼 처리 (onclick 인라인 완전 제거)
document.addEventListener('click',function(e){
  var btn=e.target.closest('.csm');
  if(!btn)return;
  var fn=btn.getAttribute('data-fn');
  var idx=parseInt(btn.getAttribute('data-idx'));
  var id=btn.getAttribute('data-id');
  var t=null;
  if(fn==='main'){t=((ST['m_'+id]||{}).topics||[])[idx];}
  else if(fn==='issue'){t=(ST['i_'+id]||[])[idx];}
  else if(fn==='written'){t=(ST['w_'+id]||[])[idx];}
  if(!t)return;
  var txt='제목: '+t.title+'\n';
  if(t.intro)txt+='도입부: "'+t.intro+'"\n';
  txt+='소제목 구성:\n';
  (t.subs||[]).forEach(function(s,i){txt+='  '+(i+1)+'. '+s+'\n';});
  txt+='핵심 키워드: '+(t.kws||[]).join(' / ');
  if(t.connection)txt+='\n연결 이유: '+t.connection;
  if(t.issue)txt+='\n관련 이슈: '+t.issue;
  navigator.clipboard.writeText(txt).then(function(){
    var o=btn.textContent;btn.textContent='복사됨';
    setTimeout(function(){btn.textContent=o;},1800);
  });
});

function renderProducts(id){
  var s=ST['m_'+id];
  if(!s)return;
  var el=document.getElementById('r'+id);
  var html='<div class="dsbar"><span class="dot '+(s.hasNaver?'dotg':'doty')+'"></span><span>분석 기준: '+s.ds+'</span></div>';
  if(s.trends&&s.trends.length){
    html+='<div class="tbar"><span class="tlbl">오늘 트렌드</span>';
    s.trends.forEach(function(t){html+='<span class="tkw2">'+t+'</span>';});
    html+='</div>';
  }
  html+='<div class="grid">';
  (s.products||[]).forEach(function(p){html+=makeProductHtml(p,s.isCoupang);});
  html+='</div>';
  html+='<div id="tarea-'+id+'"></div>';
  html+='<div class="cbar"><button class="cbtn" data-copy-all="'+id+'">전체 복사</button></div>';
  el.innerHTML=html;
}

function renderTopics(id){
  var s=ST['m_'+id];
  if(!s||!s.topics)return;
  var el=document.getElementById('tarea-'+id);
  if(!el)return;
  var html='<div class="stitle">오늘 함께 쓰면 좋은 블로그 주제</div>';
  s.topics.forEach(function(t,i){html+=makeTopicHtml(t,i,'main" data-id="'+id);});
  el.innerHTML=html;
}

document.addEventListener('click',function(e){
  var btn=e.target.closest('[data-copy-all]');
  if(!btn)return;
  var id=btn.getAttribute('data-copy-all');
  var s=ST['m_'+id];
  if(!s)return;
  var txt='날짜: '+s.dt+'\n트렌드: '+(s.trends||[]).join(', ')+'\n\n';
  (s.products||[]).forEach(function(p){
    txt+='['+p.n+'] '+p.name+'\n카테고리: '+p.cat+'\n이유: '+p.reason+'\nSEO: '+(p.kws||[]).join(' / ')+'\n';
    if(s.isCoupang)txt+='쿠팡: https://www.coupang.com/np/search?q='+encodeURIComponent(p.name)+'\n';
    txt+='\n';
  });
  if(s.topics&&s.topics.length){
    txt+='[추천 블로그 주제]\n';
    s.topics.forEach(function(t,i){
      txt+='\n['+(i+1)+'] '+t.title+'\n';
      if(t.intro)txt+='도입부: "'+t.intro+'"\n';
      (t.subs||[]).forEach(function(s,si){txt+='  '+(si+1)+'. '+s+'\n';});
      txt+='키워드: '+(t.kws||[]).join(' / ')+'\n';
    });
  }
  navigator.clipboard.writeText(txt).then(function(){alert('복사됐습니다!');});
});

function runW(id){
  var k=gk();
  if(!k.ak){openModal();return;}
  var input=document.getElementById('wtxt-'+id).value.trim();
  if(!input){alert('오늘 쓴 글 주제를 입력해주세요.');return;}
  var blog=BL[id];
  var btn=document.getElementById('wrun-'+id);
  var rel=document.getElementById('w'+id);
  btn.disabled=true;btn.textContent='분석 중...';
  rel.innerHTML='';

  var written=input.split(/[,\n]/).map(function(s){return s.trim();}).filter(Boolean);
